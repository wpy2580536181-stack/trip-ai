id: hangzhou-2days-rainy-day
description: 杭州 2 天突遇持续降雨，验证 Agent 主动调整方案为室内活动
tags: [hangzhou, weather-adaptation, edge-case]

input:
  message: "我下周去杭州 2 天，看了天气预报一直下雨，帮我调整成室内为主的方案"
  preferences:
    travelStyle: relaxed
    pace: slow
    interests: [文化, 美食, 博物馆]
    avoidCrowds: true
  history: []

expected:
  # 必含 POI：杭州室内为主
  # 模糊：灵隐寺是雨天经典但 agent 可能推别的室内场所
  must_contain_pois:
    - { name_contains: "博物馆" }                    # 浙江省博物馆 / 良渚博物院等

  # 关键词：Agent 应该主动提到天气应对（"雨"/"雨天"/"室内" 都接受）
  must_contain_keywords: [雨, 室内]

  # 反向：露天为主的活动不该是核心
  # 注意：西湖虽然可雨中游船/漫步，但 Agent 不应把"环湖骑行"作为重点
  must_not_contain_keywords:
    - 骑行环湖
    - 露天
    - 草坪野餐

  days: 2
  json_valid: true

  tool_calls:
    - { name: "retrieve_knowledge", min_calls: 1 }

evaluators:
  - poi_city_match
  - keyword_coverage
  - tool_call_audit
