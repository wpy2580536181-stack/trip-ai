id: chengdu-3days-foodie-relaxed
description: 成都 3 天慢节奏美食之旅，验证基础行程生成 + 用户偏好生效
tags: [smoke, chengdu, food, relaxed, basic]

input:
  message: "带父母去成都玩 3 天，他们喜欢慢节奏和美食"
  preferences:
    travelStyle: relaxed
    pace: slow
    interests: [美食, 文化]
    avoidCrowds: true
  history: []

expected:
  # 必含 POI：宽窄巷子、锦里是成都美食文化地标
  # city 允许省略：Agent 可能推荐"成都附近的都江堰"也算合理
  # 模糊匹配：兼容"宽窄巷子"和"宽窄巷子景区"
  must_contain_pois:
    - { name_contains: "宽窄巷子", city: "成都" }
    - { name_contains: "锦里", city: "成都" }

  # 关键词：父辈旅行常问的
  must_contain_keywords: [火锅, 茶馆]

  # 反向断言：不该出现的内容
  must_not_contain_keywords: [酒吧, 夜店, 蹦极]

  # 结构断言
  days: 3
  json_valid: true

  # 工具调用：行程规划必须用 RAG
  tool_calls:
    - { name: "retrieve_knowledge", min_calls: 1 }

  # 行程节奏：每天不超过 4 个核心活动（慢节奏）
  max_activities_per_day: 4

evaluators:
  - schema_check
  - poi_city_match
  - keyword_coverage
  - tool_call_audit
  - pace_consistency  # 慢节奏：≤4 活动/天
