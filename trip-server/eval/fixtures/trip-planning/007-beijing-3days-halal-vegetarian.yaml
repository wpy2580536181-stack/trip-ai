id: beijing-3days-halal-vegetarian
description: 北京 3 天穆斯林旅客，验证 Agent 推荐清真餐厅 + 排除猪肉食材
tags: [beijing, dietary, halal, edge-case]

input:
  message: "我是穆斯林，3 天去北京旅游，麻烦只推荐清真餐厅，别出现猪肉"
  preferences:
    travelStyle: relaxed
    interests: [历史, 美食, 文化]
  history: []

expected:
  # 必含 POI：北京清真美食推荐（任一匹配即可）
  must_contain_pois:
    - { name_contains: "清真" }

  # 关键词：用户没明说要解释但 Agent 应该用清真相关词（任一命中即可）
  must_contain_keywords: [清真, 牛街, 北京美食，清真餐厅]
  keyword_match_mode: any

  # 反向：伊斯兰教禁忌（用户明确要求"别出现猪肉"）
  must_not_contain_keywords:
    - 猪肉

  days: 3

  tool_calls:
    - { name: "retrieve_knowledge", min_calls: 1 }

evaluators:
  - schema_check
  - poi_city_match
  - keyword_coverage
  - dietary_constraint_check
  - tool_call_audit
