id: beijing-3days-halal-vegetarian
description: 北京 3 天穆斯林旅客，验证 Agent 推荐清真餐厅 + 排除猪肉食材
tags: [beijing, dietary, halal, edge-case]

input:
  message: "我是穆斯林，3 天去北京旅游，麻烦只推荐清真餐厅，别出现猪肉"
  preferences:
    travelStyle: relaxed
    interests: [历史, 美食, 文化]
  history: []

expected:
  # 必含 POI：北京清真美食地标
  must_contain_pois:
    - { name_contains: "牛街", city: "北京" }          # 北京最大清真美食街
    - { name_contains: "鸿宾楼", city: "北京" }        # 著名清真餐厅（也可接受其他清真馆）

  # 关键词：用户没明说要解释但 Agent 应该用清真相关词
  must_contain_keywords: [清真, 牛街]

  # 反向：伊斯兰教禁忌
  must_not_contain_keywords:
    - 猪肉
    - 烤肠
    - 小龙虾                                  # 多用啤酒配，少数非清真
    - 全聚德                                  # 烤鸭不全是清真，谨慎起见排除
    - 涮羊肉                                  # 多非清真

  days: 3
  json_valid: true

  tool_calls:
    - { name: "retrieve_knowledge", min_calls: 1 }

evaluators:
  - schema_check
  - poi_city_match
  - keyword_coverage
  - dietary_constraint_check
  - tool_call_audit
