id: multi-turn-destination-change
description: 多轮对话：第一轮问成都 → 用户改主意去重庆，验证 Agent 跟随最新指令
tags: [multi-turn, context, override]

input:
  message: "那改成重庆吧，2 天"
  history:
    - { role: user, content: "成都 3 天行程", timestamp: "2026-06-21T10:00:00Z" }
    - { role: assistant, content: "好的，我帮你规划成都 3 天...", timestamp: "2026-06-21T10:00:05Z" }
  preferences:
    travelStyle: relaxed
    pace: slow

expected:
  # 关键：必须跟随新目的地（重庆），不能再提成都
  must_contain_pois:
    - { name_contains: "解放碑", city: "重庆" }
    - { name_contains: "洪崖洞", city: "重庆" }

  # 反向：不该再推荐成都的
  must_not_contain_keywords: [宽窄巷子, 锦里, 春熙路]

  days: 2
  json_valid: true

  tool_calls:
    - { name: "retrieve_knowledge", min_calls: 1 }

evaluators:
  - schema_check
  - poi_city_match
  - destination_override   # 关键：检测是否跟随了最新指令
  - context_memory         # 是否记得"用户改主意了"
  - tool_call_audit
