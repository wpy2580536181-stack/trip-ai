name: Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消同一分支前序运行（节省 CI 分钟）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit + Type + Mock Eval
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: trip-server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trip-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # 1) TypeScript 严格类型检查（含 eval/）
      - name: Type check (src)
        run: npx tsc --noEmit

      - name: Type check (eval)
        run: npm run eval:typecheck

      # 2) 单元测试
      - name: Unit tests
        run: npx vitest run

      # 3) Mock 评估（不耗 token，跑全套 fixture）
      - name: Mock eval
        run: npm run eval

  # 真实 LLM eval 不在 CI 跑（耗 token + 慢 + 波动大）
  # 改为：每周日 02:00 跑一次，结果存档
  nightly:
    name: Nightly Real Eval
    runs-on: ubuntu-latest
    # 仅 main 分支 + 手动触发
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: test
    timeout-minutes: 60
    # 周日 02:00 UTC (= 10:00 北京时间)
    schedule:
      - cron: '0 2 * * 0'

    defaults:
      run:
        working-directory: trip-server

    env:
      # CI 上不连真实 LLM（缺 API key）
      # 如果接了 secrets，可在 repo settings 加 DEEPSEEK_API_KEY
      EVAL_SKIP: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trip-server/package-lock.json

      - name: Install
        run: npm ci

      - name: Run real eval (or skip if EVAL_SKIP=1)
        run: |
          if [ "$EVAL_SKIP" = "1" ]; then
            echo "::warning::EVAL_SKIP=1, skipping real eval (need DEEPSEEK_API_KEY secret)"
            exit 0
          fi
          EVAL_DELAY_MS=3000 npm run eval:real

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: trip-server/eval-reports/
          retention-days: 90
